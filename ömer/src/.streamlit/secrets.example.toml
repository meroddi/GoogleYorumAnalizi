# =====================================================================
# ORNEK secrets dosyasi - SADECE PLACEHOLDER degerler icerir.
#
# Kullanim:
#   1) Bu dosyayi ayni klasorde "secrets.toml" olarak kopyalayin.
#   2) Placeholder degerleri kendi gercek degerlerinizle degistirin.
#   3) secrets.toml ASLA commit edilmez (.gitignore'da haric tutulur).
#
# Streamlit Community Cloud'da:
#   App > Settings > Secrets bolumune ayni anahtarlari yapistirin.
# =====================================================================

# Google OAuth (My Business API icin refresh token akisi)
OAUTH_CLIENT_ID     = "PLACEHOLDER-google-web-client-id"
OAUTH_CLIENT_SECRET = "PLACEHOLDER-google-web-client-secret"
OAUTH_REFRESH_TOKEN = "PLACEHOLDER-google-refresh-token"

# Google Places API (KPI / yildiz-toplam yorum icin)
PLACES_API_KEY      = "PLACEHOLDER-google-places-api-key"

# Yonetici giris sifresinin SHA-256 hash'i.
# Hash uretmek icin:
#   python -c "import hashlib; print(hashlib.sha256('SIFRENIZ'.encode()).hexdigest())"
APP_PASSWORD_HASH   = "PLACEHOLDER-sifrenizin-sha256-hashi"
